<html lang="en">
<head>

    <title>Document</title>
    <style>
        img {
            width: 200px;
            height: 200px;
        }
        div {
            width: 200px;
            height: 200px;
            position: absolute;
        }
        .satu {
            background-color: salmon;
        }
        .dua {
            background-color: lightgreen;
            top: 100px;
            left: 100px;
        }
        .tiga {
            background-color: royalblue;
            top: 200px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="satu">
    <img src="WhatsApp Image 2026-04-07 at 10.18.58 (1).jpeg"></div>
    <div class="dua">
    <img src="WhatsApp Image 2026-04-07 at 10.18.57.jpeg"></div>
    <div class="tiga">
    <img src="WhatsApp Image 2026-04-07 at 10.18.57 (1).jpeg"></div>
</body>
</html>
